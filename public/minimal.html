<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>OmniAntigravity Lite Mode</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem("omni-theme") || "dark";
    </script>
  </head>
  <body>
    <div class="minimal-shell">
      <header class="minimal-header">
        <div class="minimal-brand">
          <h1>Lite Mode</h1>
          <div class="minimal-subtitle">
            Minimal chat view for weak networks and quick replies
          </div>
        </div>
        <div class="status-badge">
          <div class="status-dot disconnected" id="minimalStatusDot"></div>
          <span id="minimalStatusText">Connecting...</span>
        </div>
      </header>

      <main class="minimal-chat" id="minimalChat">
        <div class="minimal-content" id="minimalContent">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading chat snapshot...</p>
          </div>
        </div>
      </main>

      <section class="minimal-input">
        <div class="input-wrapper">
          <textarea
            id="minimalMessageInput"
            rows="1"
            placeholder="Message..."
          ></textarea>
          <button class="send-btn" id="minimalSendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24">
              <path d="M22 2 11 13"></path>
              <path d="M22 2 15 22l-4-9-9-4 20-7Z"></path>
            </svg>
          </button>
        </div>
      </section>
    </div>

    <script type="module" src="/js/minimal.js"></script>
  </body>
</html>
